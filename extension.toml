# Zelos Extension Manifest
# See https://docs.zeloscloud.io/sdk/how-to/develop-extensions/ for full documentation

name = "OPAL-RT"
version = "0.1.0"
description = "Zelos extension for OPAL-RT real-time simulation systems"
author = "Zelos"
repository = "https://github.com/zeloscloud/zelos-opal"

# File references (relative paths in archive)
icon = "assets/icon.svg"
readme = "README.md"

# Configuration schema (enables UI in Zelos App)
[config]
schema = "config.schema.json"

# Runtime configuration
[runtime]
type = "python"
entry = "main.py"
python_version = "3.11"

[stop]
grace_seconds = 10
